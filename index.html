<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scacchiera Interattiva</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
        }
        
        .sfondo {
            width: 102vw;
            height: 102vh;
            position: fixed;
            top: -1vh;
            left: -1vh;
            z-index: -1;
            pointer-events: none; 
        }

        .box {
            border: 1px solid black;
            width: 50px;
            height: 50px;
            text-align: center;      /* Centra il contenuto orizzontalmente */
            vertical-align: middle;  /* Centra il contenuto verticalmente in un <td> */
            cursor: pointer;

        }

        /* Il cerchio verde */
        .indicatore {
            width: 30px;
            height: 30px;
            background-color: #2ecc71;
            border-radius: 50%;
            opacity: 0; 
            transition: opacity 0.3s ease;
            display: inline-block;   /* Necessario per farsi centrare dal text-align del padre */
            margin-top: -15px;         /* Piccolo aggiustamento per centrare perfettamente se necessario */
            margin-left: -15px;
            position: fixed;
        }

        .pezzo {
            width: 30px;
            height: 30px;
            display: inline-block;   /* Necessario per farsi centrare dal text-align del padre */
        }

        .tabella-indici {
            pointer-events: none;
            z-index: 5;
        }

        .scacchiera-reale {
            z-index: 10;
        }
    </style>
</head>
<body>
    <img src="sfondo2.jpg" class="sfondo">
    <script src="app.js"></script>
</body>
</html>
